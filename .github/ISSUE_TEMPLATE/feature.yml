name: Feature request
description: Suggest a new feature or improvement.
labels: [enhancement]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What problem does this solve? What would you like to be able to do?
    validations:
      required: true
  - type: textarea
    id: proposed_approach
    attributes:
      label: Proposed approach
      description: How do you think this could be implemented? (Optional but helpful.)
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered and why you prefer this one.
    validations:
      required: false
