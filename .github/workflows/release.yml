name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # required for npm OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Build .mcpb
        run: npx tsx scripts/build-mcpb.ts
      # Only bump npm when OIDC is actually used (no NPM_TOKEN). Bundled npm
      # already supports --provenance for token-based publish.
      - name: Bump npm to latest (only if no NPM_TOKEN; needed for OIDC)
        if: ${{ secrets.NPM_TOKEN == '' }}
        run: npm install -g npm@latest
      - name: Publish to npm
        run: |
          set +e
          if [ -n "$NPM_TOKEN" ]; then
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
            echo "Using NPM_TOKEN-based publish."
          else
            echo "Using OIDC trusted publishing."
          fi
          npm publish --access public --provenance
          status=$?
          if [ $status -ne 0 ]; then
            VERSION=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view "$(node -p "require('./package.json').name")" versions --json 2>/dev/null || echo '[]')
            if echo "$PUBLISHED" | grep -q "\"$VERSION\""; then
              echo "::notice::Version $VERSION already published; skipping."
              exit 0
            fi
            exit $status
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: swissgroceries-mcp.mcpb
          generate_release_notes: true
