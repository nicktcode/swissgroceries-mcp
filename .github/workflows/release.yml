name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # required for npm OIDC trusted publishing
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Build .mcpb
        run: npx tsx scripts/build-mcpb.ts
      # Only bump npm when OIDC is actually used (no NPM_TOKEN). Bundled npm
      # already supports --provenance for token-based publish.
      - name: Bump npm to latest (only if no NPM_TOKEN; needed for OIDC)
        if: env.NPM_TOKEN == ''
        run: npm install -g npm@latest
      - name: Publish to npm
        env:
          # setup-node@v4 wrote ~/.npmrc using NODE_AUTH_TOKEN; pass the secret in
          # under that name (rather than writing the npmrc ourselves) so the auth
          # mechanism matches what npm expects.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            echo "Using NPM_TOKEN-based publish."
            npm publish --access public
          else
            echo "Using OIDC trusted publishing (provenance auto-enabled)."
            npm publish --access public --provenance
          fi
          status=$?
          if [ $status -ne 0 ]; then
            VERSION=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view "$(node -p "require('./package.json').name")" versions --json 2>/dev/null || echo '[]')
            if echo "$PUBLISHED" | grep -q "\"$VERSION\""; then
              echo "::notice::Version $VERSION already published; skipping."
              exit 0
            fi
            exit $status
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: swissgroceries-mcp.mcpb
          generate_release_notes: true
